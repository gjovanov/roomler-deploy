apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: roomler

resources:
  - namespace.yaml
  - configmap-roomler-config.yaml
  - service-roomler.yaml
  - service-janus.yaml
  - service-janus-nodeport.yaml
  - service-redis.yaml
  - service-mongodb.yaml
